name: Gerar Executável Windows v3

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite correr o processo manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descarregar o código do Repositório
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Altera para a versão que usas localmente, se necessário

    - name: 3. Instalar Dependências e PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 4. Compilar com PyInstaller
      run: |
        # --onefile: Junta o python todo num único .exe
        # --noconsole: Como o teu script já faz tudo em segundo plano e gera o log.txt,
        #              isto impede que se abra aquela janela preta de comando (Prompt) no Windows.
        pyinstaller --onefile --noconsole auto_logs.py

    - name: 5. Organizar Pasta Final
      run: |
        # Cria uma pasta limpa para o utilizador
        mkdir dist\Programa_Logs
        
        # Move o executável gerado para lá
        move dist\auto_logs.exe dist\Programa_Logs\
        
        # Copia os ficheiros de configuração para o utilizador poder editar
        copy acesso.txt dist\Programa_Logs\
        copy uuids.csv dist\Programa_Logs\

    - name: 6. Disponibilizar para Download (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Programa_Logs_Windows
        path: dist/Programa_Logs/
