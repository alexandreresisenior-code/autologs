name: Gerar Executável Windows (PyInstaller - Modo Pasta Seguro)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descarregar o código do Repositório
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar Dependências e PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl selenium pyinstaller

    - name: 4. Compilar com PyInstaller (Garante que inclui todo o Selenium)
      run: |
        # --collect-all selenium: Força o PyInstaller a recolher todas as sub-bibliotecas dinâmicas do Selenium
        pyinstaller --collect-all selenium auto_logs.py

    - name: 5. Copiar Configurações para a Pasta do Programa
      shell: cmd
      run: |
        copy acesso.txt dist\auto_logs\
        copy uuids.csv dist\auto_logs\

    - name: 6. Disponibilizar para Download (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Programa_Logs_Seguro
        path: dist/auto_logs/
