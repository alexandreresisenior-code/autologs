name: Gerar Executável Windows (PyInstaller - Modo Pasta)v3

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite-te correr o processo manualmente no GitHub sempre que quiseres

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descarregar o código do Repositório
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar Dependências e PyInstaller
      run: |
        python -m pip install --upgrade pip
        # Forçamos a instalação explícita de todas as bibliotecas necessárias para evitar erros
        pip install requests pandas openpyxl selenium pyinstaller

    - name: 4. Compilar com PyInstaller (Em segundo plano)
      run: |
        # --noconsole: Remove a janela preta de comandos. O executável corre em background.
        # Nota: Não usamos o --onefile para o antivírus não bloquear o programa.
        pyinstaller --noconsole auto_logs.py

    - name: 5. Copiar Configurações para a Pasta do Programa
      shell: cmd
      run: |
        # Coloca o acesso.txt e o uuids.csv ao lado do executável para poderes alterar os dados
        copy acesso.txt dist\auto_logs\
        copy uuids.csv dist\auto_logs\

    - name: 6. Disponibilizar para Download (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Programa_Logs_PyInstaller
        path: dist/auto_logs/
