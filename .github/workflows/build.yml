name: Gerar Executável Windows (Nuitka)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite correr o processo manualmente clicando no botão no GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descarregar o código
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar Dependências e Nuitka
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: 4. Compilar com Nuitka
      run: |
        # --standalone: Garante que o executável leva o Python e as bibliotecas lá dentro
        # --onefile: Junta tudo num único ficheiro .exe final
        # --windows-console-mode=disable: Remove a janela preta de comando (execução totalmente invisível)
        # --assume-yes-for-downloads: Permite descarregar as dependências do Nuitka sem travar a automação
        python -m nuitka --standalone --onefile --windows-console-mode=disable --assume-yes-for-downloads auto_logs.py

    - name: 5. Organizar Pasta Final
      shell: cmd
      run: |
        # Cria uma pasta limpa para agrupar o programa e as configurações
        mkdir Pasta_Final
        
        # Move o executável gerado para a nova pasta
        move auto_logs.exe Pasta_Final\
        
        # Copia os teus ficheiros de configuração para o utilizador poder editar
        copy acesso.txt Pasta_Final\
        copy uuids.csv Pasta_Final\

    - name: 6. Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: Programa_Logs_Nuitka
        path: Pasta_Final/
