name: Gerar Executável Windows (PyInstaller - Modo Pasta)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite correr o processo manualmente clicando no botão no GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descarregar o código
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar Dependências e PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 4. Compilar com PyInstaller
      run: |
        # --noconsole: Remove a janela preta de comando (execução 100% invisível)
        # Nota: Não usamos o --onefile. O PyInstaller vai criar uma pasta organizada em dist/auto_logs/
        pyinstaller --noconsole auto_logs.py

    - name: 5. Copiar Configurações para a Pasta do Programa
      shell: cmd
      run: |
        # Copia o acesso.txt e o uuids.csv diretamente para dentro da pasta do executável
        copy acesso.txt dist\auto_logs\
        copy uuids.csv dist\auto_logs\

    - name: 6. Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: Programa_Logs_PyInstaller
        path: dist/auto_logs/
