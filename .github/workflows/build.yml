name: Gerar Executável Windows v3

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite correr o processo manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descarregar o código do Repositório
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Altera para a versão que usas localmente, se necessário

    - name: 3. Instalar Dependências e PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 4. Compilar com PyInstaller (Usando pasta em vez de ficheiro único)
    run: |
      # Retirámos o --onefile. Agora ele gera uma pasta em dist/auto_logs/
      pyinstaller --noconsole auto_logs.py

    - name: 5. Organizar Pasta Final
      run: |
        # Copia os ficheiros de configuração diretamente para dentro da pasta gerada
        copy acesso.txt dist\auto_logs\
        copy uuids.csv dist\auto_logs\

    - name: 6. Disponibilizar para Download (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Programa_Logs_Windows
        path: dist/auto_logs/
