name: Gerar Executável Windows (Nuitka)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descarregar o código
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar Dependências e Nuitka
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: 4. Compilar com Nuitka (Gera um EXE nativo muito mais limpo)
      run: |
        # --standalone: inclui o python
        # --onefile: junta tudo num ficheiro
        # --disable-console: equivalente ao --noconsole do pyinstaller
        python -m nuitka --standalone --onefile --disable-console auto_logs.py

    - name: 5. Organizar Pasta Final
      run: |
        mkdir Pasta_Final
        move auto_logs.exe Pasta_Final\
        copy acesso.txt Pasta_Final\
        copy uuids.csv Pasta_Final\

    - name: 6. Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: Programa_Logs_Nuitka
        path: Pasta_Final/
